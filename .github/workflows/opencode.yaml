name: OpenCode Agent
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  MODEL: ${{ vars.MODEL || 'opencode/minimax-m2.5-free' }}

jobs:
  opencode:
    if: startsWith(github.event.comment.body, '/oc') || startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: OpenCode Action
        uses: anomalyco/opencode/github@latest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: ${{ env.MODEL }}
          share: true
          prompt: |
            1. Think Before Coding
            Don't assume. Don't hide confusion. Surface tradeoffs.
            LLMs often pick an interpretation silently and run with it. This principle forces explicit reasoning:
            - State assumptions explicitly — If uncertain, ask rather than guess
            - Present multiple interpretations — Don't pick silently when ambiguity exists
            - Push back when warranted — If a simpler approach exists, say so
            - Stop when confused — Name what's unclear and ask for clarification

            2. Simplicity First
            Minimum code that solves the problem. Nothing speculative.
            Combat the tendency toward overengineering:
            - No features beyond what was asked
            - No abstractions for single-use code
            - No "flexibility" or "configurability" that wasn't requested
            - No error handling for impossible scenarios
            - If 200 lines could be 50, rewrite it
            The test: Would a senior engineer say this is overcomplicated? If yes, simplify.

            3. Surgical Changes
            Touch only what you must. Clean up only your own mess.
            When editing existing code:
            - Don't "improve" adjacent code, comments, or formatting
            - Don't refactor things that aren't broken
            - Match existing style, even if you'd do it differently
            - If you notice unrelated dead code, mention it — don't delete it
            When your changes create orphans:
            - Remove imports/variables/functions that YOUR changes made unused
            - Don't remove pre-existing dead code unless asked
            The test: Every changed line should trace directly to the user's request.

            4. Goal-Driven Execution
            Define success criteria. Loop until verified.
            Transform imperative tasks into verifiable goals:
            - Instead of "Add validation" -> Transform to "Write tests for invalid inputs, then make them pass"
            - Instead of "Fix the bug" -> Transform to "Write a test that reproduces it, then make it pass"
            - Instead of "Refactor X" -> Transform to "Ensure tests pass before and after"
            For multi-step tasks, state a brief plan:
            1. [Step] -> verify: [check]
            2. [Step] -> verify: [check]
            3. [Step] -> verify: [check]
            
            "Upon completion, include this exact message in your PR and comment:
            '🤖 Executed using the model: ${{ env.MODEL }}'"

      - name: Fix share URL
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          REPO="${{ github.repository }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          OLD_PATTERN="https://opencode.ai/s/"
          NEW_PATTERN="https://opncd.ai/share/"

          fix_comment() {
            local comment_id=$1
            TMPFILE=$(mktemp)
            gh api "repos/$REPO/issues/comments/$comment_id" \
              | jq --arg old "$OLD_PATTERN" --arg new "$NEW_PATTERN" \
                '{body: (.body | gsub($old; $new))}' > "$TMPFILE"
            gh api "repos/$REPO/issues/comments/$comment_id" -X PATCH --input "$TMPFILE" --silent
            rm -f "$TMPFILE"
            echo "  Fixed comment $comment_id"
          }

          fix_pr_body() {
            local pr_number=$1
            TMPFILE=$(mktemp)
            gh api "repos/$REPO/pulls/$pr_number" \
              | jq --arg old "$OLD_PATTERN" --arg new "$NEW_PATTERN" \
                '{body: (.body | gsub($old; $new))}' > "$TMPFILE"
            gh api "repos/$REPO/pulls/$pr_number" -X PATCH --input "$TMPFILE" --silent
            rm -f "$TMPFILE"
            echo "  Fixed PR #$pr_number body"
          }

          echo "=== Fixing share URLs in issue #$ISSUE_NUMBER comments ==="
          COMMENT_IDS=$(gh api "repos/$REPO/issues/$ISSUE_NUMBER/comments" --paginate \
            --jq ".[] | select(.body | contains(\"$OLD_PATTERN\")) | .id")
          for CID in $COMMENT_IDS; do
            fix_comment "$CID"
          done

          echo "=== Checking open PRs ==="
          PR_NUMBERS=$(gh pr list --repo "$REPO" --state open --json number --jq '.[].number')
          for PR in $PR_NUMBERS; do
            # Fix PR body if it contains the old URL
            PR_BODY=$(gh api "repos/$REPO/pulls/$PR" --jq '.body // empty')
            if echo "$PR_BODY" | grep -qF "$OLD_PATTERN"; then
              fix_pr_body "$PR"
            fi
            # Fix comments on the PR
            PR_CIDS=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
              --jq ".[] | select(.body | contains(\"$OLD_PATTERN\")) | .id")
            for CID in $PR_CIDS; do
              fix_comment "$CID"
            done
          done

          echo "=== Done ==="
